{% extends "base.html" %} {% block content %}

<section class="chat-section">
    <div class="chat-container">
        <div class="chat-header">
            <a href="{{ url_for('chat.inbox') }}" class="back-link">← Inbox</a>

            <div>
                <strong>{{ other_user.full_name }}</strong>
                <span>{{ listing.title }}</span>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            {% for msg in messages %}
            <div class="chat-message {% if msg.sender_id == current_user.id %}sent{% else %}received{% endif %}">
                <p>{{ msg.content }}</p>
                <span>{{ msg.created_at.strftime("%H:%M") }}</span>
            </div>
            {% endfor %}
        </div>

        <form method="POST" class="chat-form">
            <input type="text" name="content" placeholder="Type your message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>
</section>

<script>
    const chatBox = document.getElementById("chatBox");
    if (chatBox) {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

{% endblock %}
